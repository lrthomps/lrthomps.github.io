---
layout: plain
---

<header class="container">
  <div id="dhead" class="container">
    <div class="row">
      <div id="headlinks">
        <h2>
          <a href="{{ "index.html" | relative_url }}">
            <img src="{{ 'assets/images/home-orange.png' | relative_url }}" height=25px></a>
          <a href="https://github.com/lrthomps" title="lrthomps">
            <img src="{{ 'assets/images/github-orange.png' | relative_url }}" height=25px></a>
          <a href="https://www.linkedin.com/in/lara-r-thompson" title="lara-r-thompson">
            <img src="{{ 'assets/images/linkedin-orange.png' | relative_url }}" height=25px></a>
          <a href="{{ "posts.html" | relative_url }}" title="posts">
            <img src="{{ 'assets/images/blog-orange.png' | relative_url }}" height=25px></a>
          <a href="{{ "resources.html" | relative_url }}" title="resources">
            <img src="{{ 'assets/images/books-orange.png' | relative_url }}" height=25px></a>
      </div>
    </div>
  </div>
</header>

<section class="container">

  <small>{{ page.date | date: "%B %Y" }}</small>
  <div id="title">
  <h1>{{ page.title }}</h1>
  {% unless page.subtitle == "" %}
  <h2>{{ page.subtitle }}</h2>
  {% endunless %}

  <p class="view">by {{ page.author | default: site.author.name }}</p>
  </div>



  {{content}}



  {% if page.tags %}
    <small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
  {% endif %}


</section>
